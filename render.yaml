services:
  - type: web
    name: slowblossom
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /ping
    disk:
      name: slowblossom-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATA_DIR
        value: /data
      - key: GEMINI_API_KEY
        sync: false
      - key: NAVER_IMAP_USERNAME
        sync: false
      - key: NAVER_IMAP_PASSWORD
        sync: false
      - key: NAVER_IMAP_SUBJECT_CONTAINS
        value: "네이버폼"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
