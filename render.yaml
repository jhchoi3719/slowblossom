services:
  - type: web
    name: slowblossom
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /ping
    disk:
      name: slowblossom-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATA_DIR
        value: /data
      - key: GEMINI_API_KEY
        sync: false
